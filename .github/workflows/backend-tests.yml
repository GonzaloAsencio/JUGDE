name: Backend Tests

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Settings requires these at construction; tests only use fakes.
      DATABASE_URL: postgresql://fake:fake@localhost/fake
      GEMINI_API_KEY: fake-api-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install CPU-only torch
        # Installed first so sentence-transformers doesn't pull the
        # multi-GB CUDA wheels the runner can't use anyway.
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest
