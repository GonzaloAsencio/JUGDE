# Tooling config for the Judge backend.
# Introduced in the refactor Phase 0 (enforcement) — see docs/refactor-plan.md.
# Adopting these tools requires NO logic changes; they only diagnose.

[tool.ruff]
target-version = "py311"  # matches the deploy runtime (Dockerfile: python:3.11-slim)
line-length = 100
extend-exclude = ["migrations"]

[tool.ruff.lint]
# Focused, high-signal ruleset for the first pass. Expand over time.
select = [
    "E",      # pycodestyle errors
    "F",      # pyflakes (unused imports/vars — F401 etc.)
    "I",      # isort (import ordering — catches the main.py E402 ordering)
    "B",      # flake8-bugbear
    "BLE",    # flake8-blind-except (BLE001 — the bare `except Exception`)
    "C90",    # mccabe complexity (flags god-functions like lifespan)
    "ASYNC",  # flake8-async (blocking calls under async def)
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
]
# Line length is enforced by the formatter, not as a blocking lint, for now.
ignore = ["E501"]

[tool.ruff.lint.mccabe]
max-complexity = 12

[tool.ruff.lint.flake8-bugbear]
# FastAPI puts callables (Depends/Query/…) in argument defaults by design —
# these are not the B008 mutable-default footgun.
extend-immutable-calls = [
    "fastapi.Depends", "fastapi.Query", "fastapi.Header",
    "fastapi.Path", "fastapi.Cookie", "fastapi.Body", "fastapi.Form",
]

[tool.ruff.lint.per-file-ignores]
# Tests and one-off scripts get a looser leash on blind-except / bugbear.
# Tests mirror the app's nested-with connection idiom (get_conn + cursor);
# SIM117 is a deferred Phase 6 call across the whole codebase, not a test-only one.
"tests/**" = ["BLE", "B", "SIM117"]
# Scripts legitimately load_dotenv()/patch sys.path before importing (E402),
# and are throwaway probes re: blind-except.
"scripts/**" = ["BLE", "E402"]

[tool.mypy]
# Gradual mode: non-blocking to start. Tighten module-by-module later.
python_version = "3.11"
ignore_missing_imports = true
disallow_untyped_defs = false
check_untyped_defs = false
warn_unused_ignores = false
warn_return_any = false
files = ["app"]
exclude = "(migrations|tests)"
